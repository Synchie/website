<ng-container *transloco="let t">
  <section class="bg-white-primary dark:bg-dark-primary">
    <div class="p-8 mx-auto max-w-screen-xl sm:py-16 lg:px-6">
      <div class="mx-auto max-w-screen-sm text-center">
        <h2
          class="mb-4 text-4xl tracking-tight font-extrabold leading-tight text-gray-900 dark:text-white-primary"
        >
          {{ t("cta.getInContact") }}
        </h2>
        <a
          href="mailto:matija.achterberg@gmail.com"
          target="_top"
          class="inline-flex h-12 mt-4 bg-white-accent dark:bg-dark-accent justify-center items-center py-3 px-5 text-base font-medium text-center text-dark-text rounded-lg bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 dark:focus:ring-primary-900"
        >
          {{ t("header.contact") }}
          <svg
            class="ml-2 -mr-1 w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
              clip-rule="evenodd"
            ></path>
          </svg>
        </a>
      </div>
    </div>
  </section>
  <footer class="p-4 bg-white-secondary sm:p-6 dark:bg-gray-900">
    <div class="mx-auto max-w-screen-xl">
      <div class="grid grid-flow-col items-center">
        <img
          src="./assets/logo.svg.svg"
          class="h-8 col-auto"
          alt="Website Logo"
        />
        <span
          class="md:text-2xl font-semibold justify-self-center whitespace-nowrap dark:text-white-primary"
          >Matija Achterberg</span
        >
        <div class="flex justify-self-end space-x-6 sm:justify-center sm:mt-0">
          <a
            href="https://www.linkedin.com/in/matija-achterberg"
            target="_blank"
          >
            <img
              class="w-5 h-5 grayscale rounded-full hover:grayscale-0"
              src="./assets/social-media/linkedin.svg"
              alt="linkedin visit"
              title="linkedin"
            />
          </a>

          <a
            href="https://www.freelance.de/Freelancer/240195-Software-Developer"
            target="_blank"
          >
            <img
              class="w-5 h-5 grayscale bg-white-primary rounded-full hover:grayscale-0"
              src="https://www.freelance.de/images/favicons/favicon.ico"
              title="freelance"
            />
          </a>
          <a href="https://github.com/Synchie" target="_blank">
            <img
              class="w-5 h-5 grayscale bg-white-primary rounded-full hover:grayscale-0"
              src="./assets/social-media/github.svg"
              title="github"
            />
          </a>
        </div>
      </div>
    </div>
  </footer>
</ng-container>
