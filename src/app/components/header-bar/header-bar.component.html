<ng-container *transloco="let t">
  <nav
    class="bg-white-secondary border-gray-200 px-4 lg:px-6 py-2.5 dark:bg-gray-900"
  >
    <div
      class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl"
    >
      <a class="flex items-center">
        <img
          src="./assets/logo.svg.svg"
          class="mr-3 h-6 sm:h-9"
          alt="Website Logo"
        />
      </a>
      <div class="flex items-center lg:order-2">
        <button
          (click)="toggleMenuBar()"
          type="button"
          class="inline-flex items-center p-2 ml-1 text-sm text-gray-500 rounded-lg lg:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
          aria-expanded="false"
        >
          <svg
            class="w-6 h-6"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
              clip-rule="evenodd"
            ></path>
          </svg>
          <svg
            class="hidden w-6 h-6"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
              clip-rule="evenodd"
            ></path>
          </svg>
        </button>
      </div>
      <div
        [@fade]
        *ngIf="isMenuShowing"
        class="w-full lg:flex lg:w-auto lg:order-1 mt-4"
      >
        <ul
          class="flex flex-col mt-4 font-medium lg:flex-row lg:space-x-8 lg:mt-0"
        >
          <li>
            <a
              (click)="toggleMenuBar()"
              href="#profile"
              class="block py-2 pr-4 pl-3 visited::bg-dark-accent border-t border-gray-100 hover:bg-gray-50 lg:hover:bg-transparent lg:border-0 lg:hover:text-primary-700 lg:p-0 dark:text-dark-secondary lg:dark:hover:text-white dark:hover:bg-gray-700 dark:hover:text-white lg:dark:hover:bg-transparent dark:border-gray-700"
              >{{ t("header.aboutMe") }}</a
            >
          </li>

          <li>
            <a
              (click)="toggleMenuBar()"
              href="#experience"
              class="block py-2 pr-4 pl-3 visited::bg-dark-accent border-t border-gray-100 hover:bg-gray-50 lg:hover:bg-transparent lg:border-0 lg:hover:text-primary-700 lg:p-0 dark:text-dark-secondary lg:dark:hover:text-white dark:hover:bg-gray-700 dark:hover:text-white lg:dark:hover:bg-transparent dark:border-gray-700"
              >{{ t("header.expierence") }}</a
            >
          </li>
          <li>
            <a
              (click)="toggleMenuBar()"
              href="#contact"
              class="block py-2 pr-4 pl-3 border-t border-gray-100 hover:bg-gray-50 lg:hover:bg-transparent lg:border-0 lg:hover:text-primary-700 lg:p-0 dark:text-dark-secondary lg:dark:hover:text-white dark:hover:bg-gray-700 dark:hover:text-white lg:dark:hover:bg-transparent dark:border-gray-700"
              >{{ t("header.contact") }}</a
            >
          </li>
        </ul>
      </div>
    </div>
  </nav>
</ng-container>
